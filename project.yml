name: ChemApex
options:
  bundleIdPrefix: com.chemapex
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_LANGUAGE: zh-Hans
schemes:
  ChemApex:
    build:
      targets:
        ChemApex: all
    test:
      targets:
        - ChemApexTests
targets:
  ChemApexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChemApexTests
    dependencies:
      - target: ChemApex
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ChemApex:
    type: application
    platform: iOS
    sources:
      - path: ChemApex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chemapex.app
        PRODUCT_NAME: ChemApex
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ChemApex
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ENABLE_PREVIEWS: YES
